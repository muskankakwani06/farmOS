<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Loan Eligibility Guide</title>
    <link rel="stylesheet" href="../static/style.css" />
    <link rel="stylesheet" href="theme.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-secondary, #f6f9f6);
            color: var(--text-primary, #333);
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 700px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        h2 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .guide-box {
            background: #e8f5e9;
            border-left: 5px solid #2e7d32;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 6px;
        }

        .guide-box h3 {
            margin-top: 0;
        }

        form label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
        }

        form input,
        form select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        form button {
            background-color: #388e3c;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
        }

        form button:hover {
            background-color: #2e7d32;
        }

        .loan-result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f1f8e9;
            border-left: 4px solid #81c784;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div style="position: absolute; top: 20px; right: 20px; z-index: 1000;">
            <button class="theme-toggle" aria-label="Toggle dark/light mode" style="background: rgba(46, 125, 50, 0.1); border: 1px solid rgba(46, 125, 50, 0.3); color: #2e7d32;">
                <i class="fas fa-sun sun-icon"></i>
                <i class="fas fa-moon moon-icon"></i>
                <span class="theme-text">Light</span>
            </button>
        </div>
        
        <h2>Smart Loan Eligibility Guide</h2>

        <div class="guide-box" id="guideText">
            <!-- Content will be injected based on language -->
        </div>

        <form id="loanForm">
            <label for="loanType">Loan Type</label>
            <select id="loanType" name="loanType" required>
                <option value="">Select a loan type</option>
                <option value="crop">Crop Cultivation</option>
                <option value="equipment">Farm Equipment</option>
                <option value="water">Water Resources</option>
                <option value="land">Land Purchase</option>
            </select>

            <label for="loanAmount">Loan Amount (₹)</label>
            <input type="number" id="loanAmount" name="loanAmount" required>

            <label for="income">Annual Income (₹)</label>
            <input type="number" id="income" name="income" required>

            <label for="experience">Farming Experience (Years)</label>
            <input type="number" id="experience" name="experience" required>

            <button type="submit">Check Eligibility</button>
        </form>

        <div id="loanResult" class="loan-result-box"></div>
    </div>

    <script>
        const lang = new URLSearchParams(window.location.search).get('lang') || 'en';

        const guideTexts = {
            en: `
                <h3>📋 How to Apply (Step-by-Step)</h3>
                <ol>
                    <li>Select your loan type from the form below.</li>
                    <li>Enter your required loan amount, annual income, and years of farming experience.</li>
                    <li>Click "Check Eligibility" to get advice on your chances and required improvements.</li>
                    <li>Review the suggested government schemes and bank loan options.</li>
                    <li>Contact your nearest bank branch to start the application.</li>
                </ol>
            `,
            hi: `
                <h3>📋 आवेदन कैसे करें (चरण-दर-चरण)</h3>
                <ol>
                    <li>नीचे दिए गए फॉर्म में अपना ऋण प्रकार चुनें।</li>
                    <li>ऋण राशि, वार्षिक आय और खेती का अनुभव भरें।</li>
                    <li>"पात्रता जांचें" पर क्लिक करें और अपने अवसर एवं सुधार के सुझाव देखें।</li>
                    <li>सरकारी योजनाओं और बैंक ऋण विकल्पों की समीक्षा करें।</li>
                    <li>आवेदन करने के लिए अपने नजदीकी बैंक शाखा से संपर्क करें।</li>
                </ol>
            `
        };

        document.getElementById('guideText').innerHTML = guideTexts[lang];
    </script>
    <script src="../static/script.js"></script>
      <style>
    .site-footer {background: var(--bg-secondary); color: var(--text-primary); margin-top:auto; padding: 2rem 1.25rem;}
    .site-footer .footer-inner {max-width:1200px;margin:0 auto; display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:1.5rem; align-items:flex-start;}
    .footer-brand {display:flex;flex-direction:column;gap:.5rem}
    .footer-logo {width:48px;height:48px;border-radius:8px;object-fit:cover;background:#fff;padding:4px}
    .site-footer h3,.site-footer h4{margin:0 0 .5rem 0}
    .site-footer p {margin:0;opacity:.9}
    .site-footer ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:.4rem}
    .site-footer a{color: var(--text-primary);text-decoration:none;opacity:.9;transition:opacity .2s}
    .site-footer a:hover{opacity:1;text-decoration:underline}
    .footer-bottom{max-width:1200px;margin:1rem auto 0; padding-top:1rem; border-top:1px solid rgba(255,255,255,.25); text-align:center; font-size:.9rem; opacity:.9}
    .social-media {display:flex;gap:1rem;margin-top:.5rem}
    .social-media a{display:flex;align-items:center;justify-content:center;width:40px;height:40px;background:rgba(255,255,255,.1);border-radius:50%;transition:all .3s ease;font-size:1.2rem}
    .social-media a:hover{background:rgba(255,255,255,.2);transform:translateY(-2px)}
  </style>
    <footer class="site-footer" role="contentinfo">
      <div class="footer-inner">
        <div class="footer-brand">
          <h3>FarmOS</h3>
          <p>Empowering India's Farming Future</p>
          <div class="social-media">
            <a href="https://github.com/muskankakwani06" target="_blank" rel="noopener noreferrer" aria-label="View our GitHub repositories">
              <i class="fab fa-github" aria-hidden="true"></i>
            </a>
          </div>
        </div>

        <div class="footer-links">
          <h4>Quick Links</h4>
          <ul>
            <li><a href="index.html">Home</a></li>

          <h4>Tools</h4>
          <ul>
            <li><a href="weather.html">Weather Check</a></li>
            <li><a href="smart_loan.html">Loan Eligibility</a></li>
            <li><a href="organic.html">Organic Farming</a></li>

        </div>
      </div>

      <div class="footer-bottom">© <span id="year"></span> FarmOS • Made for farmers</div>
    </footer>

      document.getElementById('year').textContent = new Date().getFullYear();
    </script>

</body>

</html>
